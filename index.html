<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess Game Multiplayer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">🎯</div>
            <h2>Leaderboard</h2>
        </div>
        <div id="leaderboard" class="leaderboard-list"></div>
    </div>

    <div class="main">
        <div class="screens-container">
            <!-- Start Screen -->
            <div id="startScreen" class="screen card">
                <div class="brand">
                    <span class="icon">🔮</span>
                    <h1>Guess The Number</h1>
                </div>
                <div class="input-group">
                    <input type="text" id="username" placeholder="Choose your username..." autocomplete="off">
                </div>
                <div class="action-row">
                    <button id="createRoomBtn" class="btn-primary" onclick="createRoom()">Create New Room</button>
                </div>
                <div id="orDivider" class="divider"><span id="orText">OR</span></div>
                <div class="input-group">
                    <input type="text" id="joinRoomCode" placeholder="Paste Room Code..." autocomplete="off">
                </div>
                <div class="action-row">
                    <button class="btn-secondary" onclick="joinRoom()">Join Existing Room</button>
                </div>
                <p id="startError" class="error hidden"></p>
            </div>

            <!-- Lobby Screen -->
            <div id="lobbyScreen" class="screen card hidden">
                <div class="room-header">
                    <h2>Room Code</h2>
                    <div class="code-box">
                        <span id="roomCodeDisplay" class="highlight-code"></span>
                        <button class="btn-icon" onclick="copyShareLink()" title="Copy Link">📋</button>
                    </div>
                    <p class="subtitle">Share this code or link with your friends to join.</p>
                </div>
                
                <div class="player-grid-container">
                    <h3>Players in Lobby</h3>
                    <div id="lobbyPlayers" class="player-grid"></div>
                </div>

                <div id="hostControls" class="hidden host-panel">
                    <h3>Select Difficulty to Start</h3>
                    <div class="difficulty-btns">
                        <button class="diff-btn easy" onclick="startGame(1)">
                            <span class="diff-title">EASY</span>
                            <span class="diff-desc">1-50 • 60s</span>
                        </button>
                        <button class="diff-btn medium" onclick="startGame(2)">
                            <span class="diff-title">MEDIUM</span>
                            <span class="diff-desc">1-75 • 45s</span>
                        </button>
                        <button class="diff-btn hard" onclick="startGame(3)">
                            <span class="diff-title">HARD</span>
                            <span class="diff-desc">1-100 • 30s</span>
                        </button>
                    </div>
                </div>
                <div id="waitingMessage" class="hidden waiting-box">
                    <div class="spinner"></div>
                    <p>Waiting for the host to start the game...</p>
                </div>
            </div>

            <!-- Game Screen -->
            <div id="gameScreen" class="screen card hidden game-layout">
                <div class="game-header">
                    <div class="turn-indicator">
                        <span class="live-dot"></span>
                        <h2 id="playerTurn" class="turn-highlight"></h2>
                    </div>
                    <div class="timer-box">
                        <svg class="timer-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
                        <span id="timer"></span>s
                    </div>
                </div>

                <div class="game-body">
                    <p id="hint" class="hint-text">Waiting for turn...</p>
                    <div class="guess-input-wrapper">
                        <input type="number" id="guess" placeholder="Your guess..." autocomplete="off">
                        <button id="guessBtn" class="btn-guess" onclick="makeGuess()">GUESS</button>
                    </div>
                </div>
                
                <div class="history-panel">
                    <h3>Live Feed</h3>
                    <div id="guessHistory" class="history-box"></div>
                </div>
            </div>

            <!-- End Screen -->
            <div id="endScreen" class="screen card hidden">
                <div class="trophy">🏆</div>
                <h1 class="game-over-title">Game Over!</h1>
                <h2 id="winnerText" class="winner-name"></h2>
                
                <div class="final-scores">
                    <h3>Final Scores</h3>
                    <div id="finalLeaderboard" class="final-leaderboard-list"></div>
                </div>

                <button class="btn-primary mt-4" onclick="goHome()">Play Again</button>
            </div>
        </div>
    </div>
</div>

<div class="ambient-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<audio id="alertSound" src="meme.mpeg"></audio>

<script src="script.js"></script>
</body>
</html>
